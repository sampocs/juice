<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Juice</title>

    <!-- Bootstrap CSS CDN -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/css/bootstrap.min.css"
        integrity="sha384-9gVQ4dYFwwWSjIDZnLEWnxCjeSWFphJiwGPXr1jddIhOegiu1FwO5qRGvFXOdJZ4" crossorigin="anonymous">
    <!-- Our Custom CSS -->
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
    
    <!-- Font Awesome JS -->
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/solid.js"
        integrity="sha384-tzzSw1/Vo+0N5UhStP3bvwWPq+uvzCMfrN1fEFe+xBmv1C/AtVX5K0uZtmcHitFZ"
        crossorigin="anonymous"></script>
    <script defer src="https://use.fontawesome.com/releases/v5.0.13/js/fontawesome.js"
        integrity="sha384-6OIrr52G08NpOFSZdxxz1xdNSndlD4vdcf/q2myIUVO0VsqaGHJsB0RaBE01VTOY"
        crossorigin="anonymous"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark py-4">
        <a class="navbar-brand" style="font-size: 2.5em; padding-right: 30px;" href="#">
            Juice
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item {{'active' if tab == 'home'}}">
                    <a class="nav-link" href="">
                        Home 
                    </a>
                </li>
                <li class="nav-item dropdown {{'active' if tab == 'season'}}">
                    <a class="nav-link" href="" role="button" data-toggle="dropdown">
                        Season  
                    </a>
                    <div class="dropdown-menu">
                        {% for week_num in past_weeks %}
                        <a class="dropdown-item" href="past/week={{week_num}}">Week {{week_num}}</a>
                        {% endfor %}
                    </div>
                </li>
                <li class="nav-item dropdown {{'active' if tab == 'past'}}">
                    <a class="nav-link" href="" role="button" data-toggle="dropdown">
                        Past  
                    </a>
                    <div class="dropdown-menu">
                        {% for week_num in past_weeks %}
                        <a class="dropdown-item" href="past/week={{week_num}}">Week {{week_num}}</a>
                        {% endfor %}
                    </div>
                </li>
                <li class="nav-item dropdown {{'active' if tab == 'upcoming'}}">
                    <a class="nav-link" href="" role="button" data-toggle="dropdown">
                        Upcoming
                    </a>
                    <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                        {% for week_num in upcoming_weeks %}
                        <a class="dropdown-item" href="past/week={{week_num}}">Week {{week_num}}</a>
                        {% endfor %}
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <!-- jQuery CDN - Slim version (=without AJAX) -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <!-- Popper.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"
        integrity="sha384-cs/chFZiN24E4KMATLdqdvsezGxaGsi4hLGOzlXwp5UZB1LY//20VyM2taTB4QvJ"
        crossorigin="anonymous"></script>
    <!-- Bootstrap JS -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.0/js/bootstrap.min.js"
        integrity="sha384-uefMccjFJAIv6A+rW+L4AHf99KvxDjWSu1z9VI8SKNVmz4sk7buKt/6v9KI65qnm"
        crossorigin="anonymous"></script>

</body>

</html>
